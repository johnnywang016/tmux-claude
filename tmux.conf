# --- General ---
set -g mouse on
set -g mode-keys vi
set-option -g set-clipboard on

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# --- Session Save/Restore ---
set -g @continuum-save-interval '10'        # auto-save every 10 min
set -g @continuum-restore 'on'              # auto-restore on tmux start
set -g @resurrect-capture-pane-contents 'on'
# Claude panes restore via the post-restore hook below (each pane resumes
# its own sessionId via `claude --resume`), not via resurrect's process
# restart list — otherwise every pane would race to `claude --continue`
# and land on the same conversation.
set -g @resurrect-hook-post-save-all 'zsh ~/.tmux-claude-save.sh'
set -g @resurrect-hook-post-restore-all 'zsh ~/.tmux-claude-restore.sh'

# --- Initialize TPM (must be last) ---
run '~/.tmux/plugins/tpm/tpm'
