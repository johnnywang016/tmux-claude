# --- General ---
set -g mouse on
set -g mode-keys vi
set-option -g set-clipboard on

# --- Layouts (Alt+1..5) ---
bind -n M-1 select-layout even-horizontal
bind -n M-2 select-layout even-vertical
bind -n M-3 select-layout main-horizontal
bind -n M-4 select-layout main-vertical
bind -n M-5 select-layout tiled

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# --- Session Save/Restore ---
set -g @continuum-save-interval '10'        # auto-save every 10 min
set -g @continuum-restore 'on'              # auto-restore on tmux start
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes '"claude --continue" "claude"'
set -g @resurrect-hook-post-save-all 'zsh ~/.tmux-claude-save.sh'

# --- Initialize TPM (must be last) ---
run '~/.tmux/plugins/tpm/tpm'
